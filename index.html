<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>SKTMR POS</title>
<style>
:root{--navy:#d22222;--blue:#b71c1c;--gold:#c9a24b;--green:#16a34a;--red:#8a1414;
--bg:#f4f1ea;--card:#fff;--ink:#1c2733;--muted:#7d8794;--line:#e3ddd0;
--ad-gap:0px;/* GitHub Pages ไม่มีแถบโฆษณา = 0 (ถ้าย้าย host ที่มีโฆษณา ค่อยเพิ่มเป็น 46px) */}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;height:100%;font-family:-apple-system,"SF Pro Text","Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink);overscroll-behavior:none;}
body.modal-open{overflow:hidden;touch-action:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
img{display:block;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
header{background:var(--navy);color:#fff;padding:10px 16px;display:flex;align-items:center;gap:12px;flex:0 0 auto;}
header .logo{font-weight:800;font-size:20px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;}
header .logo img{height:34px;max-width:160px;object-fit:contain;display:block;}
header .sub{font-size:12px;opacity:.7;}
header .spacer{flex:1;}
header .clock{font-variant-numeric:tabular-nums;font-size:14px;opacity:.85;}
.top-btn{background:rgba(255,255,255,.14);color:#fff;padding:8px 13px;border-radius:10px;font-size:13px;font-weight:600;}
.top-btn.on{background:var(--gold);color:#2a2106;}
.menuwrap{position:relative;}
.menudrop{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border-radius:14px;box-shadow:0 10px 32px rgba(20,30,45,.28);padding:6px;min-width:208px;z-index:130;display:none;flex-direction:column;gap:2px;}
.menudrop.open{display:flex;}
.menudrop .mitem{display:flex;align-items:center;gap:11px;width:100%;padding:13px 14px;border-radius:10px;font-size:15px;font-weight:600;color:var(--ink);text-align:left;background:#fff;}
.menudrop .mitem:active{background:#f3efe6;}
.menudrop .mitem.on{background:var(--gold);color:#2a2106;}
.menudrop .mitem .mi-ic{font-size:17px;width:22px;text-align:center;flex:0 0 auto;}
.main{display:flex;flex:1;min-height:0;}
.left{flex:1;display:flex;flex-direction:column;min-width:0;}
.controls{padding:10px 12px;display:flex;gap:8px;align-items:center;flex:0 0 auto;}
.sortsel{height:46px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-size:15px;padding:0 10px;color:var(--ink);flex:0 0 auto;max-width:170px;}
.bordbtn{height:46px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-size:14px;font-weight:600;color:var(--navy);padding:0 14px;flex:0 0 auto;white-space:nowrap;}
.bordbtn.on{background:var(--navy);color:#fff;border-color:var(--navy);}
@media(max-width:640px){.controls{flex-wrap:wrap;}.sortsel{max-width:none;flex:1;}.bordbtn{flex:1;}}
.brands button.drag{position:relative;}
.brands button .ord{display:inline-block;min-width:16px;height:16px;line-height:16px;text-align:center;background:var(--gold);color:#2a2106;border-radius:8px;font-size:10px;margin-right:4px;}
#search{flex:1;height:46px;border-radius:12px;border:1.5px solid var(--line);padding:0 16px;font-size:17px;background:#fff;}
.brands{display:flex;gap:8px;overflow-x:auto;padding:4px 12px 10px;flex:0 0 auto;-webkit-overflow-scrolling:touch;}
.brands button{flex:0 0 auto;padding:9px 16px;border-radius:20px;background:#fff;border:1.5px solid var(--line);font-size:14px;font-weight:600;color:var(--muted);white-space:nowrap;}
.brands button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.grid{flex:1;overflow-y:auto;padding:8px 14px 100px;display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;align-content:start;-webkit-overflow-scrolling:touch;}
.tile{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:0;text-align:left;display:flex;flex-direction:column;overflow:hidden;min-height:292px;transition:transform .06s;position:relative;}
.tile:active{transform:scale(.96);}
.tile .thumb{width:100%;height:clamp(170px,20vw,260px);background:#ece6da center/contain no-repeat;display:flex;align-items:center;justify-content:center;color:#bcae93;font-size:42px;border-bottom:1px solid var(--line);}
.tile .body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:4px;flex:1;}
.tile .b{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;}
.tile .n{font-size:15px;font-weight:700;line-height:1.25;flex:1;}
.tile .p{font-size:17px;font-weight:800;color:var(--navy);}
.tile .szrow{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.tile .szchip{font-size:11px;font-weight:700;padding:3px 7px;border-radius:9px;background:#eef3ee;color:var(--green);border:1px solid #d6e6d9;line-height:1.3;}
.tile .szchip.szl{background:#fdf3e3;color:#b07a16;border-color:#f0dcb8;}
.tile .szchip.sz0{background:#f6e3e3;color:#b03030;border-color:#e8c4c4;text-decoration:line-through;opacity:.7;}
.tile .stk{position:absolute;top:6px;right:6px;background:#fffd;border:1px solid var(--line);border-radius:10px;font-size:11px;font-weight:700;padding:2px 7px;color:var(--green);}
.tile .stk.low{color:var(--red);}.tile .stk.zero{background:var(--red);color:#fff;border-color:var(--red);}
.empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:40px;font-size:15px;}
.cart{width:340px;flex:0 0 340px;background:#fff;border-left:1px solid var(--line);display:flex;flex-direction:column;}
.cart h2{margin:0;padding:14px 16px;font-size:16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;}
.cart h2 .cnt{background:var(--blue);color:#fff;border-radius:12px;font-size:12px;padding:2px 9px;font-weight:700;}
.cart h2 .arrow{display:none;}
.items{flex:1;overflow-y:auto;padding:6px 0;}
.ci{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid #f1ede4;}
.ci .ttl{flex:1;min-width:0;}.ci .ttl .nm{font-size:13px;font-weight:600;line-height:1.2;}
.ci .ttl .vr{font-size:11px;color:var(--muted);}.ci .ttl .ln{font-size:12px;color:var(--navy);font-weight:700;margin-top:2px;}
.qty{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:10px;overflow:hidden;}
.qty button{width:30px;height:32px;font-size:18px;font-weight:700;color:var(--navy);background:#f7f4ed;}
.qty span{width:30px;text-align:center;font-size:15px;font-weight:700;}
.cart .foot{border-top:1px solid var(--line);padding:12px 16px;flex:0 0 auto;}
.row{display:flex;justify-content:space-between;align-items:center;margin:6px 0;font-size:14px;}
.row.big{font-size:22px;font-weight:800;color:var(--navy);}
.row input{width:120px;height:38px;border:1.5px solid var(--line);border-radius:8px;text-align:right;font-size:16px;padding:0 8px;}
.pays{display:flex;gap:6px;margin:8px 0;}
.pays button{flex:1;padding:11px 0;border-radius:9px;border:1.5px solid var(--line);font-size:14px;font-weight:600;color:var(--muted);background:#fff;}
.pays button.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.change{color:var(--red);font-weight:800;}
.checkout{width:100%;height:54px;background:var(--green);color:#fff;font-size:18px;font-weight:800;border-radius:13px;margin-top:8px;}
.checkout:disabled{background:#b9c2bd;}
.clearcart{width:100%;height:36px;background:none;color:var(--muted);font-size:13px;margin-top:6px;}
.overlay{position:fixed;inset:0;background:rgba(20,30,45,.55);display:flex;align-items:flex-end;justify-content:center;z-index:120;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);overscroll-behavior:contain;}
.sheet{background:#fff;width:100%;max-width:720px;border-radius:20px 20px 0 0;padding:18px 18px 28px;max-height:min(90vh,90dvh);overflow-y:auto;-webkit-overflow-scrolling:touch;animation:sheetUp .18s ease-out;}
@keyframes sheetUp{from{transform:translateY(18px);opacity:.75}to{transform:translateY(0);opacity:1}}
.sheet h3{margin:0 0 4px;font-size:18px;}.sheet .sb{font-size:12px;color:var(--gold);font-weight:700;text-transform:uppercase;}
.sheet .hero{width:100%;height:min(52vh,420px);border-radius:16px;background:#f3efe6 center/contain no-repeat;border:1.5px solid var(--line);margin:12px 0 14px;display:flex;align-items:center;justify-content:center;color:#bcae93;font-size:48px;}
.sheet .hero.hasimg{cursor:zoom-in;}
/* แกลเลอรีเลื่อนรูป (swipe ได้แบบ IG) */
.sheet .gallery{position:relative;margin:12px 0 14px;}
.sheet .gtrack{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;border-radius:16px;border:1.5px solid var(--line);scrollbar-width:none;}
.sheet .gtrack::-webkit-scrollbar{display:none;}
.sheet .gslide{flex:0 0 100%;height:min(52vh,420px);scroll-snap-align:center;background:#f3efe6 center/contain no-repeat;cursor:zoom-in;}
.sheet .gdots{display:flex;gap:6px;justify-content:center;margin-top:8px;}
.sheet .gdot{width:7px;height:7px;border-radius:50%;background:var(--line);transition:background .2s,width .2s;}
.sheet .gdot.on{background:var(--navy);width:18px;border-radius:4px;}
.sheet .gcount{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.5);color:#fff;font-size:12px;font-weight:700;padding:2px 9px;border-radius:20px;pointer-events:none;}
.imgview{position:fixed;inset:0;background:rgba(20,30,45,.86);display:flex;align-items:center;justify-content:center;z-index:140;padding:18px;}
.imgview .imgbox{position:relative;max-width:96vw;max-height:90vh;}
.imgview img{max-width:96vw;max-height:86vh;object-fit:contain;border-radius:16px;background:#fff;}
.imgview .x{position:absolute;top:-14px;right:-14px;width:38px;height:38px;border-radius:19px;background:#fff;color:var(--navy);font-size:28px;font-weight:700;box-shadow:0 4px 18px #0004;}
.close{position:sticky;top:0;float:right;font-size:26px;color:var(--muted);width:36px;height:36px;}
.varlist{display:flex;flex-direction:column;gap:8px;margin-top:14px;}
.var{display:flex;align-items:center;gap:12px;padding:14px;border:1.5px solid var(--line);border-radius:12px;text-align:left;background:#fff;width:100%;}
.var .sw{width:34px;height:34px;border-radius:8px;border:1px solid #0002;flex:0 0 auto;}
.var .vthumb{width:54px;height:54px;border-radius:9px;border:1px solid var(--line);flex:0 0 auto;background:#ece6da center/cover no-repeat;position:relative;cursor:zoom-in;}
.var .vthumb.empty{cursor:default;}
.var .vthumb[data-vimg]::after{content:'⤢';position:absolute;right:2px;bottom:1px;font-size:11px;color:#fff;background:rgba(0,0,0,.45);border-radius:5px;padding:0 3px;line-height:1.4;}
.var .meta{flex:1;}.var .meta .s{font-size:15px;font-weight:700;}.var .meta .c{font-size:13px;color:var(--muted);}
.var .stq{font-size:12px;font-weight:700;margin-right:6px;}
.var .stq.ok{color:var(--green);}.var .stq.low{color:var(--gold);}.var .stq.zero{color:var(--red);}
.var .pr{font-size:16px;font-weight:800;color:var(--navy);min-width:64px;text-align:right;}
.var:disabled{opacity:.45;}.var:active{background:#f3efe6;}
.payov{position:fixed;inset:0;background:rgba(20,30,45,.72);display:flex;align-items:center;justify-content:center;z-index:150;padding:16px;overscroll-behavior:contain;}
.paycard{background:#fff;width:100%;max-width:430px;border-radius:22px;overflow:hidden;display:flex;flex-direction:column;max-height:92vh;}
.paycard .ph{background:var(--navy);color:#fff;padding:18px;text-align:center;}
.paycard .ph .amt{font-size:38px;font-weight:800;letter-spacing:.5px;}
.paycard .ph .lab{font-size:13px;opacity:.8;}
.paycard .pb{padding:20px;overflow-y:auto;text-align:center;}
.paycard .qrimg{max-width:260px;width:100%;margin:0 auto 8px;border-radius:12px;border:1px solid var(--line);}
.bankbox{text-align:left;border:1.5px solid var(--line);border-radius:14px;padding:16px;margin-top:6px;}
.bankbox .bk{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:800;color:var(--navy);}
.bankbox .accrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px;}
.bankbox .acc{font-size:26px;font-weight:800;letter-spacing:1px;font-variant-numeric:tabular-nums;}
.bankbox .nm{font-size:15px;margin-top:4px;}
.bankbox .copy{background:var(--blue);color:#fff;padding:8px 14px;border-radius:9px;font-size:13px;font-weight:700;}
.cashinfo{font-size:16px;margin:6px 0;}
.cashinfo .chg{font-size:30px;font-weight:800;color:var(--green);}
.paycard .pf{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line);}
.paycard .pf button{flex:1;height:52px;border-radius:13px;font-size:16px;font-weight:800;}
.btn-cancel{background:#f1ede4;color:var(--muted);}
.btn-done{background:var(--green);color:#fff;}
.mgr{position:fixed;inset:0;background:var(--bg);z-index:110;display:flex;flex-direction:column;}
.sum{position:fixed;inset:0;background:var(--bg);z-index:112;display:flex;flex-direction:column;}
.sum header{background:var(--navy);}
.sumtabs{display:flex;gap:8px;padding:10px 12px;}
.sumtabs button{flex:1;height:44px;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-size:15px;font-weight:700;color:var(--muted);}
.sumtabs button.on{background:var(--navy);color:#fff;border-color:var(--navy);}
.sumbody{flex:1;overflow-y:auto;padding:0 12px 30px;-webkit-overflow-scrolling:touch;}
.sumcards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0;}
.sumcard{background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:14px;}
.sumcard .lab{font-size:12px;color:var(--muted);font-weight:600;}
.sumcard .val{font-size:24px;font-weight:800;color:var(--navy);margin-top:4px;}
.sumcard.g .val{color:var(--green);}
.daterow{display:flex;align-items:center;gap:8px;margin:10px 0;}
.daterow select{flex:1;height:44px;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-size:15px;padding:0 10px;}
.seclbl{font-size:13px;font-weight:800;color:var(--navy);margin:14px 0 6px;}
.payline{display:flex;justify-content:space-between;padding:10px 14px;background:#fff;border:1.5px solid var(--line);border-radius:11px;margin-bottom:6px;font-size:14px;}
.payline b{color:var(--navy);}
.toprow{display:flex;justify-content:space-between;padding:9px 14px;border-bottom:1px solid #f1ede4;font-size:14px;}
.toprow:last-child{border-bottom:none;}
.toprow .qn{color:var(--muted);font-size:12px;}
.billcard{background:#fff;border:1.5px solid var(--line);border-radius:14px;margin:8px 0;overflow:hidden;}
.billhead{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;}
.billhead .bt{flex:1;}
.billhead .bt .t1{font-size:14px;font-weight:700;}
.billhead .bt .t2{font-size:12px;color:var(--muted);}
.billhead .amt{font-size:16px;font-weight:800;color:var(--green);}
.billhead .paytag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;background:var(--bg);color:var(--navy);border:1px solid var(--line);}
.billitems{padding:0 14px 8px;display:none;}
.billcard.open .billitems{display:block;}
.billitems .it{display:flex;justify-content:space-between;padding:6px 0;border-top:1px solid #f4f0e8;font-size:13px;}
.billitems .it .nm small{color:var(--muted);}
.sumempty{text-align:center;color:var(--muted);padding:40px;}
.mgr header{background:var(--blue);}
.mgr .mtools{padding:10px 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.mgr .mtools input.search{flex:1;min-width:160px;height:42px;border-radius:10px;border:1.5px solid var(--line);padding:0 14px;font-size:16px;background:#fff;}
.mgr .mtools .imp{background:var(--navy);color:#fff;padding:0 14px;height:42px;border-radius:10px;font-size:13px;font-weight:700;}
.mlist{flex:1;overflow-y:auto;padding:0 12px 30px;}
.impbar{background:#fff;border:1.5px solid var(--line);border-radius:12px;margin:10px 0;padding:12px;}
.impbar h4{margin:0 0 8px;font-size:14px;}
.impbar .ir{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.impbar input.url{flex:1;min-width:200px;height:40px;border:1.5px solid var(--line);border-radius:8px;padding:0 12px;font-size:13px;}
.impbar button{height:40px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:700;background:var(--green);color:#fff;}
.impbar .hint{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5;}
.pcard{background:#fff;border:1.5px solid var(--line);border-radius:14px;margin:10px 0;overflow:hidden;}
.pcard .ph2{display:flex;gap:12px;padding:12px;align-items:center;}
.pcard .ph2 .thumb{width:60px;height:60px;border-radius:10px;background:#ece6da center/cover no-repeat;flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#bcae93;font-size:22px;}
.pcard .ph2 .info{flex:1;min-width:0;}.pcard .ph2 .info .bb{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;}
.pcard .ph2 .info .nn{font-size:15px;font-weight:700;line-height:1.2;}
.pcard .imgrow{display:flex;gap:8px;padding:0 12px 12px;}
.pcard .imgrow input{flex:1;height:38px;border:1.5px solid var(--line);border-radius:8px;padding:0 12px;font-size:13px;}
.pcard .imgrow button{padding:0 12px;border-radius:8px;font-size:13px;font-weight:700;background:var(--blue);color:#fff;}
.pcard .vrow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-top:1px solid #f1ede4;}
.pcard .vrow .sw{width:26px;height:26px;border-radius:7px;border:1px solid #0002;flex:0 0 auto;}
.pcard .vrow .lbl{flex:1;font-size:14px;}.pcard .vrow .lbl small{color:var(--muted);}
.pcard .vrow .stwrap{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:9px;overflow:hidden;}
.pcard .vrow .stwrap button{width:34px;height:36px;font-size:18px;font-weight:700;background:#f7f4ed;color:var(--navy);}
.pcard .vrow .stwrap input{width:48px;height:36px;text-align:center;border:none;font-size:16px;font-weight:700;}
.pcard .vimgrow{display:flex;gap:8px;padding:0 12px 10px 48px;}
.pcard .vimgrow input{flex:1;height:34px;border:1.5px solid var(--line);border-radius:8px;padding:0 10px;font-size:12px;}
.pcard .vimgrow button{padding:0 12px;border-radius:8px;font-size:12px;font-weight:700;background:var(--gold);color:#2a2106;}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:var(--green);color:#fff;padding:14px 26px;border-radius:30px;font-size:16px;font-weight:700;z-index:200;box-shadow:0 6px 20px #0003;max-width:80%;text-align:center;}
@media(max-width:1100px) and (min-width:769px){.grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));}.tile .thumb{height:210px;}}
@media(max-width:768px) and (min-width:640px){.grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}.tile .thumb{height:210px;}.tile{min-height:300px;}}
@media(max-width:820px){.cart{width:300px;flex-basis:300px;}}

/* ====== iPhone / narrow: stack vertically, NO position:fixed ======
   The cart sits in normal flow at the bottom of #app (a flex column).
   This avoids the iOS Safari / iframe bug that pushed the fixed bar
   into the middle of the screen. */
@media(max-width:768px){
  #app{height:calc(100dvh - var(--ad-gap));padding-bottom:var(--ad-gap);}
  .main{flex-direction:column;min-height:0;}
  .left{flex:1 1 auto;min-height:0;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));padding-bottom:16px;}
  .tile{min-height:245px;}
  .tile .thumb{height:160px;}

  /* cart = bottom panel in normal flow, collapses to a 56px bar */
  .cart{
    width:100%;
    flex:0 0 auto;
    border-left:none;
    border-top:none;
    background:#fff;
    border-radius:18px 18px 0 0;
    box-shadow:0 -8px 24px #0003;
    max-height:56px;
    overflow:hidden;
    transition:max-height .25s ease;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .cart.open{max-height:78dvh;display:flex;flex-direction:column;}
  .cart:not(.open) .items,
  .cart:not(.open) .foot{display:none;}
  .cart.open .items{flex:1;min-height:0;overflow-y:auto;}
  .cart.open .foot{flex:0 0 auto;}

  .cart h2{
    cursor:pointer;
    height:56px;min-height:56px;
    padding:0 16px;
    background:var(--blue);
    color:#fff;
    border-bottom:none;
    border-radius:18px 18px 0 0;
    display:flex;align-items:center;
  }
  .cart h2 .cnt{background:#fff;color:var(--blue);}
  .cart h2 .tot{margin-left:auto;font-size:15px;font-weight:800;}
  .cart h2 .arrow{display:inline-block;margin-left:8px;font-size:13px;transition:transform .2s;}
  .cart.open h2 .arrow{transform:rotate(180deg);}

  header .sub{display:none;} header{gap:6px;padding:10px 8px;}
  header .logo{font-size:17px;}
  header .clock{display:none;}
  .top-btn{padding:8px 8px;font-size:11px;}
  .overlay{align-items:flex-end;}
  .sheet{max-width:100%;max-height:min(86vh,86dvh);border-radius:18px 18px 0 0;padding-bottom:calc(24px + env(safe-area-inset-bottom));}
  .sheet .hero{height:min(38vh,330px);}
  .paycard{max-width:100%;}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo" id="logoBox" title="แตะเพื่อเปลี่ยนโลโก้">SKTMR</div><div class="sub">POS · Pop-up</div>
    <div class="spacer"></div>
    <div class="clock" id="clock"></div>
    <button class="top-btn" id="refreshBtn" title="โหลดสินค้าใหม่จากชีต">↻ รีเฟรช</button>
    <div class="menuwrap">
      <button class="top-btn" id="menuBtn">เมนู ▾</button>
      <div class="menudrop" id="menuDrop">
        <button class="mitem" id="stockBtn"><span class="mi-ic">📦</span>จัดการสต็อก</button>
        <button class="mitem" id="staffBtn"><span class="mi-ic">👤</span><span id="staffLbl">พนักงาน</span></button>
        <button class="mitem" id="salesBtn"><span class="mi-ic">📊</span>ยอดขาย</button>
        <button class="mitem" id="syncBtn"><span class="mi-ic">🔄</span>ซิงค์</button>
        <button class="mitem" id="exportBtn"><span class="mi-ic">⬇️</span>Export</button>
      </div>
    </div>
  </header>
  <div class="main">
    <div class="left">
      <div class="controls"><input id="search" placeholder="ค้นหาสินค้า / brand…" autocomplete="off"><select id="sortSel" class="sortsel"><option value="def">เรียง: ปกติ</option><option value="price_asc">ราคาน้อย→มาก</option><option value="price_desc">ราคามาก→น้อย</option><option value="name_asc">ชื่อ ก→ฮ / A→Z</option><option value="name_desc">ชื่อ ฮ→ก / Z→A</option></select><button id="brandOrderBtn" class="bordbtn">จัดเรียงแบรนด์</button></div>
      <div class="brands" id="brands"></div>
      <div class="grid" id="grid"></div>
    </div>
    <div class="cart">
      <h2 id="cartHead">ตะกร้า <span class="cnt" id="cnt">0</span><span class="tot" id="cartHeadTot"></span><span class="arrow">▲</span></h2>
      <div class="items" id="items"></div>
      <div class="foot">
        <div class="row"><span>ยอดรวม</span><span id="sub">0 ฿</span></div>
        <div class="row"><span>ส่วนลด (฿)</span><input id="disc" type="number" inputmode="numeric" value="0"></div>
        <div class="row big"><span>สุทธิ</span><span id="total">0 ฿</span></div>
        <div class="pays" id="pays">
          <button data-p="พร้อมเพย์" class="on">พร้อมเพย์</button>
          <button data-p="โอน">โอน</button>
          <button data-p="เงินสด">เงินสด</button>
        </div>
        <div id="cashWrap">
          <div class="row"><span>รับเงิน</span><input id="cash" type="number" inputmode="numeric" placeholder="0"></div>
          <div class="row"><span>เงินทอน</span><span class="change" id="change">0 ฿</span></div>
        </div>
        <button class="checkout" id="checkout" disabled>คิดเงิน (Checkout)</button>
        <button class="clearcart" id="clear">ล้างตะกร้า</button>
      </div>
    </div>
  </div>
</div>

const THB=n=>Math.round(n).toLocaleString('en-US')+' ฿';
const SW={Black:'#1c1c1c',White:'#fafafa',Pink:'#e89ab5',Blue:'#3a6ea5',Navy:'#26344d',Grey:'#8a8a8a',Gray:'#8a8a8a',Green:'#2e7d4f',Red:'#c0392b',Orange:'#e08a3c',Yellow:'#e8c44d',Purple:'#6a5acd',Beige:'#d8c8a8',Brown:'#7a5230','Off White':'#efe9dd',Cream:'#f0e7d2'};
let CARDS=BASE.map(c=>({...c,v:c.v.map(v=>({...v}))}));
let state={brand:'ทั้งหมด',q:'',cart:[],pay:'พร้อมเพย์',disc:0,cash:'',staff:'',qr:DEFAULT_QR_IMAGE,sort:'def'};
const DEFAULT_BRAND_ORDER=['UVU','SlowSunday','VOTTA','Bandit','The North Face','247Repre.'];
let BRAND_ORDER=[];

const MEM={};
const PFX='sktmr_pos_v2_';
function _ls(){try{const k='__t';localStorage.setItem(k,'1');localStorage.removeItem(k);return localStorage;}catch(e){return null;}}
const LS=_ls();
async function gget(k){try{if(LS){const v=LS.getItem(PFX+k);return v==null?null:JSON.parse(v);}return MEM[k]!==undefined?MEM[k]:null;}catch(e){return null;}}
async function gset(k,v){try{if(LS){LS.setItem(PFX+k,JSON.stringify(v));}else{MEM[k]=v;}}catch(e){try{MEM[k]=v;}catch(e2){}}}

async function boot(){
  try{
    const ov=await gget('overrides');
    if(ov){CARDS.forEach(c=>{if(ov.img&&ov.img[c.id]!=null)c.img=ov.img[c.id];if(ov.imgs&&ov.imgs[c.id])c.imgs=ov.imgs[c.id];c.v.forEach(v=>{if(ov.st&&ov.st[v.vid]!=null)v.st=ov.st[v.vid];if(ov.vimg&&ov.vimg[v.vid]!=null)v.vimg=ov.vimg[v.vid];});});}
    const qr=await gget('qr'); if(qr&&qr.length>20)state.qr=qr;
    const stf=await gget('staff'); if(stf)state.staff=stf;
    const sheetUrl=await gget('sheetUrl'); window._sheetUrl=sheetUrl||DEFAULT_SHEET_URL;
    const cat=await gget('catalog'); if(cat&&cat.length){CARDS=cat;}
    const scu=await gget('sheetCsvUrl'); if(scu){SHEET_CSV_URL=scu;}
    const sa=await gget('salesApi'); if(sa){SALES_API=sa; flushSaleQueue(true);}
    const bo=await gget('brandOrder'); if(bo&&bo.length)BRAND_ORDER=bo;
    const sp=await gget('sortPref'); if(sp){state.sort=sp;}
    const lg=await gget('logo'); if(lg)renderLogo(lg);
    {const sl=document.getElementById('staffLbl');if(sl)sl.textContent=state.staff?('พนักงาน: '+state.staff):'พนักงาน';}
  }catch(e){console.error('boot load failed',e);}
  {const ss=document.getElementById('sortSel');if(ss)ss.value=state.sort;}
  rebuildBrands();renderGrid();renderCart();
  const srcUrl=SHEET_CSV_URL||DEFAULT_SHEET_URL;
  document.getElementById('syncBtn').classList.add('on');loadFromSheet(srcUrl,true);
}
async function saveOverrides(){const img={},imgs={},st={},vimg={};CARDS.forEach(c=>{img[c.id]=c.img;if(c.imgs&&c.imgs.length)imgs[c.id]=c.imgs;c.v.forEach(v=>{st[v.vid]=v.st;if(v.vimg)vimg[v.vid]=v.vimg;});});await gset('overrides',{img,imgs,st,vimg});}

const elBrands=document.getElementById('brands');
const grid=document.getElementById('grid');
const cardStock=c=>c.v.reduce((s,v)=>s+(+v.st||0),0);
function renderGrid(){
  const q=state.q.toLowerCase();
  let list=CARDS.filter(c=>(state.brand==='ทั้งหมด'||c.b===state.brand)&&(!q||(c.p+' '+c.b).toLowerCase().includes(q)));
  const pmin=c=>Math.min(...c.v.map(v=>v.pr||0));
  if(state.sort==='price_asc')list.sort((a,b)=>pmin(a)-pmin(b));
  else if(state.sort==='price_desc')list.sort((a,b)=>pmin(b)-pmin(a));
  else if(state.sort==='name_asc')list.sort((a,b)=>a.p.localeCompare(b.p,'th'));
  else if(state.sort==='name_desc')list.sort((a,b)=>b.p.localeCompare(a.p,'th'));
  grid.innerHTML='';
  if(!list.length){grid.innerHTML=CARDS.length?'<div class="empty">ไม่พบสินค้า</div>':'<div class="empty">กำลังโหลดสินค้าจากชีต…<br><span style="font-size:13px">ถ้าค้างนาน ตรวจว่าชีตตั้ง Publish/Anyone-with-link แล้ว</span></div>';return;}
  list.forEach(c=>{
    const minp=Math.min(...c.v.map(v=>v.pr));const tot=cardStock(c);
    const t=document.createElement('button');t.className='tile';
    const thumb=c.img?`<div class="thumb" style="background-image:url('${c.img.replace(/'/g,"%27")}')"></div>`:`<div class="thumb">👟</div>`;
    const bySize=new Map();
    c.v.forEach(v=>{const k=(v.s||'-');bySize.set(k,(bySize.get(k)||0)+(+v.st||0));});
    let sizeHtml=[...bySize.entries()].sort((a,b)=>sizeRank(a[0])-sizeRank(b[0])).map(([s,n])=>{const sc=n<=0?'sz0':(n<=2?'szl':'');return `<span class="szchip ${sc}">${s} : ${n}</span>`;}).join('');
    const corner=tot<=0?`<span class="stk zero">หมด</span>`:'';
    t.innerHTML=`${thumb}${corner}<div class="body"><div class="b">${c.b}</div><div class="n">${c.p}</div><div class="p">${THB(minp)}</div><div class="szrow">${sizeHtml}</div></div>`;
    t.onclick=()=>openVariants(c);grid.appendChild(t);
  });
}

const ov=document.createElement('div');
function lockModal(){document.body.classList.add('modal-open');}
function unlockModal(){document.body.classList.remove('modal-open');}
function openVariants(c){
  closeCartSheet();
  lockModal();
  ov.className='overlay';ov.innerHTML='';
  const sh=document.createElement('div');sh.className='sheet';
  const imgs=(c.imgs&&c.imgs.length)?c.imgs:(c.img?[c.img]:[]);
  let heroHtml;
  if(imgs.length>1){
    const slides=imgs.map(u=>`<div class="gslide" style="background-image:url('${u.replace(/'/g,"%27")}')"></div>`).join('');
    const dots=imgs.map((_,i)=>`<span class="gdot${i===0?' on':''}"></span>`).join('');
    heroHtml=`<div class="gallery"><div class="gtrack">${slides}</div><div class="gcount">1/${imgs.length}</div><div class="gdots">${dots}</div></div>`;
  }else if(imgs.length===1){
    heroHtml=`<div class="hero hasimg" style="background-image:url('${imgs[0].replace(/'/g,"%27")}')"></div>`;
  }else{
    heroHtml=`<div class="hero">👟</div>`;
  }
  // show per-variant thumbnails only when at least one variant has its own image
  const anyVimg=c.v.some(v=>v.vimg);
  let h=`<button class="close">&times;</button><div class="sb">${c.b}</div><h3>${c.p}</h3>${heroHtml}<div class="varlist">`;
  c.v.forEach((v,i)=>{const col=SW[v.c]||'#bbb';const left=(+v.st||0)-cartQty(v.vid);const sc=left<=0?'zero':(left<=2?'low':'ok');
    const vimg=v.vimg||'';
    const thumbEl=anyVimg
      ? (vimg
          ? `<span class="vthumb" data-vimg="${i}" style="background-image:url('${vimg.replace(/'/g,"%27")}')"></span>`
          : `<span class="vthumb empty" style="background:${col}"></span>`)
      : `<span class="sw" style="background:${col}"></span>`;
    h+=`<button class="var" data-i="${i}" ${left<=0?'disabled':''}>${thumbEl}<div class="meta"><div class="s">${v.s||'-'}</div><div class="c">${v.c||''}</div></div><span class="stq ${sc}">เหลือ ${left}</span><span class="pr">${THB(v.pr)}</span></button>`;});
  h+='</div>';sh.innerHTML=h;
  sh.querySelector('.close').onclick=closeOv;
  const hero=sh.querySelector('.hero.hasimg');
  if(hero)hero.onclick=()=>openImageViewer(imgs[0],c.p);
  // gallery: update dots/counter on swipe, tap a slide to zoom
  const track=sh.querySelector('.gtrack');
  if(track){
    const dots=[...sh.querySelectorAll('.gdot')];const counter=sh.querySelector('.gcount');
    const slides=[...sh.querySelectorAll('.gslide')];
    track.addEventListener('scroll',()=>{
      const idx=Math.round(track.scrollLeft/track.clientWidth);
      dots.forEach((d,i)=>d.classList.toggle('on',i===idx));
      if(counter)counter.textContent=(idx+1)+'/'+imgs.length;
    },{passive:true});
    slides.forEach((sl,i)=>sl.onclick=()=>openImageViewer(imgs[i],c.p));
  }
  // tapping a variant thumbnail opens the zoom viewer instead of adding to cart
  sh.querySelectorAll('.vthumb[data-vimg]').forEach(th=>{th.onclick=(e)=>{e.stopPropagation();openImageViewer(c.v[+th.dataset.vimg].vimg,c.p+' · '+(c.v[+th.dataset.vimg].c||''));};});
  sh.querySelectorAll('.var').forEach(b=>{if(!b.disabled)b.onclick=()=>{addToCart(c,c.v[+b.dataset.i]);closeOv();};});
  ov.appendChild(sh);document.body.appendChild(ov);ov.onclick=e=>{if(e.target===ov)closeOv();};
}
function openImageViewer(src,title){
  const wrap=document.createElement('div');wrap.className='imgview';
  const box=document.createElement('div');box.className='imgbox';
  const btn=document.createElement('button');btn.className='x';btn.innerHTML='&times;';
  const img=document.createElement('img');img.src=src;img.alt=title||'product image';
  btn.onclick=()=>wrap.remove();box.appendChild(btn);box.appendChild(img);wrap.appendChild(box);
  wrap.onclick=e=>{if(e.target===wrap)wrap.remove();};
  document.body.appendChild(wrap);
}
function closeOv(){if(ov.parentNode)ov.parentNode.removeChild(ov);unlockModal();}
const cartQty=vid=>{const x=state.cart.find(i=>i.vid===vid);return x?x.q:0;};
function addToCart(c,v){const ex=state.cart.find(x=>x.vid===v.vid);if(ex){if(ex.q<(+v.st||0))ex.q++;}else state.cart.push({vid:v.vid,b:c.b,p:c.p,s:v.s,c:v.c,pr:v.pr,q:1,max:+v.st||0});renderCart();closeCartSheet();}

const itemsEl=document.getElementById('items');
function totals(){const sub=state.cart.reduce((s,i)=>s+i.pr*i.q,0);const disc=Math.max(0,+state.disc||0);return{sub,disc,total:Math.max(0,sub-disc)};}
function renderCart(){
  itemsEl.innerHTML='';
  state.cart.forEach((it,idx)=>{
    const d=document.createElement('div');d.className='ci';
    d.innerHTML=`<div class="ttl"><div class="nm">${it.p}</div><div class="vr">${it.b} · ${it.s||'-'} · ${it.c||''}</div><div class="ln">${THB(it.pr*it.q)}</div></div><div class="qty"><button data-a="m">−</button><span>${it.q}</span><button data-a="p">+</button></div>`;
    d.querySelector('[data-a=p]').onclick=()=>{if(it.q<it.max)it.q++;renderCart();};
    d.querySelector('[data-a=m]').onclick=()=>{it.q--;if(it.q<=0)state.cart.splice(idx,1);renderCart();};
    itemsEl.appendChild(d);
  });

function parseCSV(text){
  text=text.replace(/^\ufeff/,'');const rows=[];let i=0,f='',row=[],q=false;
  while(i<text.length){const ch=text[i];
    if(q){if(ch==='"'){if(text[i+1]==='"'){f+='"';i+=2;continue;}q=false;i++;continue;}f+=ch;i++;continue;}
    if(ch==='"'){q=true;i++;continue;}
    if(ch===','){row.push(f);f='';i++;continue;}
    if(ch==='\n'||ch==='\r'){if(ch==='\r'&&text[i+1]==='\n')i++;row.push(f);if(row.some(x=>x!==''))rows.push(row);row=[];f='';i++;continue;}
    f+=ch;i++;}
  if(f!==''||row.length){row.push(f);if(row.some(x=>x!==''))rows.push(row);}
  return rows;
}

function _num(x){if(x==null)return 0;let s=(''+x).replace(/[^0-9.\-]/g,'');let n=parseFloat(s);return isNaN(n)?0:n;}
const SIZE_ORDER=['XXS','XS','S','M','L','XL','XXL','XXXL','3XL','4XL'];
const DUAL_ORDER=['XS/S','S/M','M/L','L/XL','XL/XXL'];
function sizeRank(sz){
  let s=(''+sz).trim().toUpperCase();
  if(!s||s==='-')return 999;
  let i=SIZE_ORDER.indexOf(s);
  if(i>=0)return i;
  let d=DUAL_ORDER.indexOf(s);
  if(d>=0)return 100+d;
  if(/^\d+$/.test(s))return 300+(+s);
  if(s==='OS'||s==='ONE SIZE'||s==='FREE SIZE')return 400;
  if(s.includes('/')||s.includes('-'))return 500;
  return 900;
}
function sortVariants(vs){
  return vs.slice().sort((a,b)=>{
    const r=sizeRank(a.s)-sizeRank(b.s);
    if(r!==0)return r;
    return (''+a.c).localeCompare(''+b.c,'th');
  });
}
function buildCatalogFromRows(rows){
  if(!rows.length)return null;
  let s=0;
  while(s<rows.length&&rows[s][0]&&rows[s][0].trim().startsWith('#'))s++;
  const head=rows[s].map(x=>x.trim().toLowerCase());s++;
  const find=(arr)=>head.findIndex(x=>arr.includes(x));
  const iB=find(['brand']),iP=find(['product']),iS=find(['size']),iC=find(['color']),
        iPr=find(['price']),iSt=head.findIndex(x=>x.includes('stock')),
        iImg=head.findIndex(x=>x==='imageurl'||x==='image'||x==='img'||x==='imagelink'||x==='photo'||(x.includes('image')&&x.includes('url'))),
        iVImg=head.findIndex(x=>x==='variantimage'||x==='varimage'||x==='colorimage'||x==='vimg'||x==='variantimg'||x==='variantimageurl'||(x.includes('variant')&&x.includes('image'))||(x.includes('color')&&x.includes('image')));
  if(iB<0||iP<0){toast('CSV ไม่มีคอลัมน์ Brand/Product');return null;}
  const groups=new Map();let order=[];
  for(let r=s;r<rows.length;r++){
    const row=rows[r];const b=(row[iB]||'').trim();const p=(iP>=0?row[iP]||'':'').trim();
    if(!b||!p)continue;
    const key=b+'||'+p;
    if(!groups.has(key)){groups.set(key,{b,p,img:'',imgs:[],v:[]});order.push(key);}
    const g=groups.get(key);
    const imgRaw=iImg>=0?(row[iImg]||'').trim():'';
    // รองรับหลายรูปในเซลล์เดียว คั่นด้วย | (เช่น url1 | url2 | url3)
    const imgList=imgRaw.split('|').map(x=>x.trim()).filter(Boolean);
    imgList.forEach(u=>{if(!g.imgs.includes(u))g.imgs.push(u);});
    const img=imgList[0]||'';if(img&&!g.img)g.img=img;
    // ถ้ามีคอลัมน์ VariantImage ใช้ค่านั้น; ถ้าไม่มี ใช้รูปแรกของแถวนี้เป็นรูปสีของ variant เอง
    const vimg=((iVImg>=0?(row[iVImg]||'').trim():'').split('|')[0]||'').trim()||img;
    g.v.push({s:(iS>=0?row[iS]||'':'').trim(),c:(iC>=0?row[iC]||'':'').trim(),pr:iPr>=0?_num(row[iPr]):0,st:iSt>=0?Math.max(0,Math.round(_num(row[iSt]))):0,vimg:vimg});
  }
  // id/vid อิงเนื้อหา (ไม่อิงลำดับแถว) เพื่อให้สต็อก/รูปที่บันทึกไว้ไม่หลุดไปผิดตัวเมื่อสลับลำดับชีต
  const cards=[];
  order.forEach(key=>{const g=groups.get(key);g.id='P'+_hash(g.b+'|'+g.p);g.v=sortVariants(g.v);g.v.forEach(v=>{v.vid=g.id+'_'+_hash((v.s||'')+'|'+(v.c||''));});cards.push(g);});
  return cards;
}
function _hash(str){let h=5381;for(let i=0;i<str.length;i++){h=((h<<5)+h+str.charCodeAt(i))>>>0;}return h.toString(36);}
async function applyCatalog(cards,label){
  if(!cards||!cards.length){toast('ไม่พบข้อมูลสินค้าใน'+(label||'ไฟล์'));return false;}
  CARDS=cards;
  await gset('catalog',CARDS);
  state.cart=[];state.brand='ทั้งหมด';state.q='';
  {const ss=document.getElementById('sortSel');if(ss)ss.value=state.sort;}
  rebuildBrands();renderGrid();renderCart();
  if(window._renderMgr&&document.getElementById('msearch'))window._renderMgr('');
  toast('โหลดสินค้าใหม่ '+CARDS.length+' รายการ (ทับของเดิม)');
  return true;
}
function orderedBrands(){
  const present=[...new Set(CARDS.map(c=>c.b))];
  // 1) user-saved custom order wins; 2) else SKTMR default order; 3) rest alphabetical
  const seed=(BRAND_ORDER&&BRAND_ORDER.length)?BRAND_ORDER:DEFAULT_BRAND_ORDER;
  let ord=seed.filter(b=>present.includes(b));
  present.filter(b=>!ord.includes(b)).sort((a,b)=>a.localeCompare(b,'th')).forEach(b=>ord.push(b));
  return ord;
}
function rebuildBrands(){
  elBrands.innerHTML='';
  const list=['ทั้งหมด',...orderedBrands()];
  list.forEach(b=>{const x=document.createElement('button');x.textContent=b;if(b===state.brand)x.className='on';
    x.onclick=()=>{state.brand=b;[...elBrands.children].forEach(e=>e.className=e.textContent===b?'on':'');renderGrid();};
    elBrands.appendChild(x);});
}

function toCsvUrl(u){
  u=(u||'').trim();
  const m=u.match(/\/spreadsheets\/d\/([\w-]+)/);
  if(m){let gid='0';const g=u.match(/[#&?]gid=(\d+)/);if(g)gid=g[1];
    return 'https://docs.google.com/spreadsheets/d/'+m[1]+'/export?format=csv&gid='+gid;}
  return u;
}
async function loadFromSheet(rawUrl,silent){
  const url=toCsvUrl(rawUrl);
  try{
    if(!silent)toast('กำลังโหลดสินค้าจากชีต…');
    const res=await fetch(url+(url.includes('?')?'&':'?')+'_t='+Date.now());
    const txt=await res.text();
    if(txt.trim().startsWith('<')){if(!silent)toast('ชีตยังไม่เปิดสาธารณะ — ดูวิธีในแชต');return false;}
    const cards=buildCatalogFromRows(parseCSV(txt));
    const ok=await applyCatalog(cards,'ชีต');
    if(ok){SHEET_CSV_URL=rawUrl;await gset('sheetCsvUrl',rawUrl);document.getElementById('syncBtn').classList.add('on');}
    return ok;
  }catch(e){if(!silent)toast('โหลดไม่สำเร็จ — ชีตต้องตั้ง Anyone with link/Publish');return false;}
}
function importCatalogCSVFile(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.csv,text/csv';
  inp.onchange=()=>{const fl=inp.files[0];if(!fl)return;const rd=new FileReader();
    rd.onload=()=>{const cards=buildCatalogFromRows(parseCSV(rd.result));applyCatalog(cards,'ไฟล์ CSV');};
    rd.readAsText(fl);};
  inp.click();
}

    '3 = อัปโหลดไฟล์ CSV (ทับทั้งหมด)\n'+
    '4 = ล้างกลับไปใช้รายการตั้งต้น\n'+
    '5 = ตั้งค่าลิงก์บันทึกยอดขายอัตโนมัติ\n'+
    '6 = ส่งบิลที่ค้างเข้าชีตอีกครั้ง',
    SHEET_CSV_URL?'2':'1');
  if(choice===null)return;
  const c=choice.trim();
  if(c==='1'){
    const u=prompt('วางลิงก์ Google Sheet (สต็อก):',SHEET_CSV_URL||'');
    if(u&&u.trim())await loadFromSheet(u.trim(),false);
  }else if(c==='2'){
    if(!SHEET_CSV_URL){toast('ยังไม่มีลิงก์ชีต — เลือก 1 ก่อน');return;}
    await loadFromSheet(SHEET_CSV_URL,false);
  }else if(c==='3'){

  }else if(c==='4'){
    if(confirm('ล้างและกลับไปใช้รายการสินค้าตั้งต้น?')){await gset('catalog',null);location.reload();}
  }else if(c==='5'){
    const u=prompt('วางลิงก์ Apps Script (ยอดขาย) ลงท้าย /exec:\n\nเว้นว่าง = ปิดการบันทึกอัตโนมัติ',SALES_API||'');
    if(u!==null){SALES_API=u.trim();await gset('salesApi',SALES_API);toast(SALES_API?'เปิดบันทึกยอดขายอัตโนมัติแล้ว':'ปิดบันทึกอัตโนมัติ');if(SALES_API)flushSaleQueue(true);}
  }else if(c==='6'){
    await flushSaleQueue(false);
  }
}

let SALES_API='';
async function sendSaleToSheet(payload){
  if(!SALES_API){ await queueSale(payload); return false; }
  try{
    const res=await fetch(SALES_API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    const d=await res.json();
    if(d&&d.ok)return true;
    throw 0;
  }catch(e){ await queueSale(payload); return false; }
}
async function queueSale(payload){
  const q=(await gget('saleQueue'))||[];
  q.push(payload); await gset('saleQueue',q);
}
async function flushSaleQueue(silent){
  if(!SALES_API)return;
  let q=(await gget('saleQueue'))||[];
  if(!q.length){ if(!silent)toast('ไม่มีบิลค้างส่ง'); return; }
  const remain=[];
  for(const p of q){
    try{
      const res=await fetch(SALES_API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)});
      const d=await res.json();
      if(!(d&&d.ok))remain.push(p);
    }catch(e){ remain.push(p); }
  }
  await gset('saleQueue',remain);
  const sent=q.length-remain.length;
  if(!silent)toast(sent? ('ส่งบิลค้าง '+sent+' บิลเข้าชีตแล้ว'+(remain.length?(' · เหลือ '+remain.length):'')) : 'ยังส่งไม่ได้ '+remain.length+' บิล');
}
function buildSalePayload(bill,date,time){
  const{sub,disc}=totals();
  const lines=state.cart.map(it=>{const lt=it.pr*it.q;const share=sub>0?Math.round(disc*lt/sub):0;
    return {brand:it.b,product:it.p,size:it.s,color:it.c,qty:it.q,price:it.pr,lineTotal:lt,lineDiscount:share,lineNet:lt-share};});
  const total=Math.max(0,sub-Math.max(0,+state.disc||0));
  return {action:'sale',bill,date,time,pay:state.pay,staff:state.staff||'-',discount:Math.max(0,+state.disc||0),total,lines};
}

let sumEl=null, sumTab='daily', sumDate='';
const salesBtn=document.getElementById('salesBtn');
salesBtn.onclick=()=>{ sumEl?closeSum():openSum(); };
function closeSum(){if(sumEl){sumEl.remove();sumEl=null;}salesBtn.classList.remove('on');}
async function openSum(){
  salesBtn.classList.add('on');
  sumEl=document.createElement('div');sumEl.className='sum';
  sumEl.innerHTML=`<header><div class="logo">สรุปยอดขาย</div><div class="spacer"></div><button class="top-btn" id="sumClose">เสร็จ / กลับหน้าขาย</button></header>
  <div class="sumtabs"><button id="tabDaily" class="on">รวมรายวัน</button><button id="tabBills">แยกบิล</button></div>
  <div class="sumbody" id="sumBody"></div>`;
  document.getElementById('app').appendChild(sumEl);
  document.getElementById('sumClose').onclick=closeSum;
  document.getElementById('tabDaily').onclick=()=>{sumTab='daily';setTabs();renderSum();};
  document.getElementById('tabBills').onclick=()=>{sumTab='bills';setTabs();renderSum();};
  const sales=await loadSales();
  const dates=[...new Set(sales.map(s=>s.date))].sort().reverse();
  sumDate=dates[0]||new Date().toISOString().slice(0,10);
  renderSum();
}
function setTabs(){
  document.getElementById('tabDaily').className=sumTab==='daily'?'on':'';
  document.getElementById('tabBills').className=sumTab==='bills'?'on':'';
}
async function renderSum(){
  const body=document.getElementById('sumBody');const sales=await loadSales();
  if(!sales.length){body.innerHTML='<div class="sumempty">ยังไม่มีรายการขาย</div>';return;}
  const dates=[...new Set(sales.map(s=>s.date))].sort().reverse();
  if(!dates.includes(sumDate))sumDate=dates[0];
  const dateSel=`<div class="daterow"><span>วันที่</span><select id="sumDateSel">${dates.map(d=>`<option value="${d}" ${d===sumDate?'selected':''}>${d}</option>`).join('')}</select></div>`;
  const day=sales.filter(s=>s.date===sumDate);
  if(sumTab==='daily'){
    const net=day.reduce((a,s)=>a+(+s.net||0),0);
    const qty=day.reduce((a,s)=>a+(+s.qty||0),0);
    const bills=[...new Set(day.map(s=>s.bill))].length;
    const disc=day.reduce((a,s)=>a+(+s.disc||0),0);
    const pays={};day.forEach(s=>{pays[s.pay]=(pays[s.pay]||0)+(+s.net||0);});
    const payHtml=Object.keys(pays).length?Object.entries(pays).map(([p,v])=>`<div class="payline"><span>${p}</span><b>${THB(v)}</b></div>`).join(''):'<div class="payline"><span>-</span></div>';
    const prod={};day.forEach(s=>{const k=s.brand+' '+s.product+(s.size?(' ('+s.size+')'):'');prod[k]=prod[k]||{q:0,n:0};prod[k].q+=(+s.qty||0);prod[k].n+=(+s.net||0);});
    const top=Object.entries(prod).sort((a,b)=>b[1].q-a[1].q).slice(0,10);
    const topHtml=top.map(([k,v])=>`<div class="toprow"><span>${k} <span class="qn">×${v.q}</span></span><b>${THB(v.n)}</b></div>`).join('');
    body.innerHTML=dateSel+
      `<div class="sumcards">
        <div class="sumcard g"><div class="lab">ยอดขายสุทธิ</div><div class="val">${THB(net)}</div></div>
        <div class="sumcard"><div class="lab">จำนวนชิ้น</div><div class="val">${qty}</div></div>
        <div class="sumcard"><div class="lab">จำนวนบิล</div><div class="val">${bills}</div></div>
        <div class="sumcard"><div class="lab">ส่วนลดรวม</div><div class="val">${THB(disc)}</div></div>
      </div>
      <div class="seclbl">แยกตามวิธีจ่าย</div>${payHtml}
      <div class="seclbl">สินค้าขายดี (Top 10)</div><div style="background:#fff;border:1.5px solid var(--line);border-radius:12px;overflow:hidden">${topHtml||'<div class="toprow">-</div>'}</div>`;
  }else{
    const billMap=new Map();
    day.forEach(s=>{if(!billMap.has(s.bill))billMap.set(s.bill,[]);billMap.get(s.bill).push(s);});
    const bills=[...billMap.entries()].sort((a,b)=>b[0].localeCompare(a[0]));
    const dayNet=day.reduce((a,s)=>a+(+s.net||0),0);
    let html=dateSel+`<div class="seclbl">${bills.length} บิล · รวม ${THB(dayNet)}</div>`;
    bills.forEach(([bill,items])=>{
      const net=items.reduce((a,s)=>a+(+s.net||0),0);
      const time=items[0].time||'';const pay=items[0].pay||'';const staff=items[0].staff||'';
      const itHtml=items.map(s=>`<div class="it"><span class="nm">${s.product} <small>${s.brand}${s.size?(' · '+s.size):''}${s.color?(' · '+s.color):''} ×${s.qty}</small></span><b>${THB(s.net)}</b></div>`).join('');
      html+=`<div class="billcard"><div class="billhead"><div class="bt"><div class="t1">เวลา ${time} · ${items.length} รายการ</div><div class="t2">พนักงาน: ${staff}</div></div><span class="paytag">${pay}</span><span class="amt">${THB(net)}</span></div><div class="billitems">${itHtml}</div></div>`;
    });
    body.innerHTML=html;
    body.querySelectorAll('.billhead').forEach(b=>b.onclick=()=>b.parentNode.classList.toggle('open'));
  }
  const ds=document.getElementById('sumDateSel');if(ds)ds.onchange=e=>{sumDate=e.target.value;renderSum();};
}
